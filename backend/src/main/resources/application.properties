spring.application.name=SmartConvert-Backend
server.port=8080

# H2 Database Config (Persistent Mode - Relative Path)
spring.datasource.url=jdbc:h2:file:./data/smartconvertdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create

# Multipart config (Increased for Batch Processing)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS (Allowed Origins for frontend)
cors.allowed-origins=*

# Logging
logging.level.com.smartconvert=DEBUG

# Gemini AI Configuration
# Get a key from: https://aistudio.google.com/
gemini.api.key=${GEMINI_API_KEY:}


# Email Configuration (SmartConvert AI)
# Replace with your SMTP credentials (e.g. Gmail, Mailgun, SendGrid)
# Note: For Gmail, use an "App Password" not your regular password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
